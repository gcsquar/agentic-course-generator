<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learner Profile</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    padding: 32px 16px 64px;
    line-height: 1.6;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #666;
    font-size: 0.9rem;
    margin-bottom: 32px;
  }

  .section {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 18px;
  }

  .field {
    margin-bottom: 20px;
  }
  .field:last-child { margin-bottom: 0; }

  label.field-label {
    display: block;
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 10px;
  }

  input[type="text"], select, textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.95rem;
    font-family: inherit;
    color: #1a1a2e;
    transition: border-color 0.15s;
    background: #fafafa;
  }
  input[type="text"]:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #5b8dee;
    background: #fff;
  }

  .options { display: flex; flex-direction: column; gap: 8px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border: 1.5px solid #e8e8e8;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover { border-color: #b0c4f5; background: #f7f9ff; }
  .option input[type="radio"] {
    margin-top: 2px;
    flex-shrink: 0;
    accent-color: #5b8dee;
    width: 16px;
    height: 16px;
  }
  .option.selected {
    border-color: #5b8dee;
    background: #eef3fd;
  }
  .option-text { font-size: 0.9rem; }

  .q-num {
    display: inline-block;
    background: #5b8dee;
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 5px;
    padding: 1px 7px;
    margin-right: 8px;
    vertical-align: middle;
  }

  .btn-generate {
    width: 100%;
    padding: 14px;
    background: #5b8dee;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .btn-generate:hover { background: #3d72d4; }

  .output-section {
    display: none;
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    margin-top: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .output-section.visible { display: block; }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .output-header h2 { font-size: 1rem; font-weight: 700; }

  .btn-copy {
    padding: 6px 14px;
    background: #f0f0f0;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-copy:hover { background: #e0e0e0; }
  .btn-copy.copied { background: #d4edda; color: #155724; }

  pre#output {
    background: #f4f5f7;
    border-radius: 8px;
    padding: 16px;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 0.82rem;
    white-space: pre-wrap;
    word-break: break-word;
    color: #2d2d2d;
    max-height: 400px;
    overflow-y: auto;
  }

  .error-msg {
    color: #c0392b;
    font-size: 0.85rem;
    margin-top: 8px;
    display: none;
  }
</style>
</head>
<body>
<div class="container">

  <h1>Learner Profile</h1>
  <p class="subtitle">Fill out this form to get a ready-made block for <code>users.md</code>, which Agent 3 uses to personalize lessons.</p>

  <!-- BASICS -->
  <div class="section">
    <div class="section-title">Basics</div>

    <div class="field">
      <label class="field-label" for="name">Name</label>
      <input type="text" id="name" placeholder="What should we call you in the materials?">
    </div>

    <div class="field">
      <label class="field-label" for="role">Role / who you are</label>
      <input type="text" id="role" placeholder="student, grad student, engineer…">
    </div>

    <div class="field">
      <label class="field-label" for="level">Level in this topic</label>
      <select id="level">
        <option value="">— choose —</option>
        <option value="beginner">Beginner — almost no background</option>
        <option value="intermediate">Intermediate — has the basics, details are patchy</option>
        <option value="expert">Expert — want details and tradeoffs</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label" for="interests">What interests you about this topic</label>
      <input type="text" id="interests" placeholder="practice, theory, intuition, applications…">
    </div>

    <div class="field">
      <label class="field-label" for="languages">Preferred language for materials</label>
      <select id="languages">
        <option value="English">English</option>
      </select>
    </div>
  </div>

  <!-- QUESTIONS -->
  <div class="section">
    <div class="section-title">Learning style</div>

    <!-- Q1 -->
    <div class="field">
      <label class="field-label"><span class="q-num">1</span>How do you usually start reading unfamiliar material?</label>
      <div class="options" data-q="q1">
        <label class="option"><input type="radio" name="q1" value="overview_first"><span class="option-text">First I check structure, headings, abstract — then details</span></label>
        <label class="option"><input type="radio" name="q1" value="linear"><span class="option-text">I read linearly from the start, and get stuck where it's unclear</span></label>
        <label class="option"><input type="radio" name="q1" value="result_first"><span class="option-text">I look for the main result and unpack backwards from there</span></label>
        <label class="option"><input type="radio" name="q1" value="formulas_first"><span class="option-text">I look at formulas/code first, then the text</span></label>
      </div>
    </div>

    <!-- Q2 -->
    <div class="field">
      <label class="field-label"><span class="q-num">2</span>When something is unclear, what helps most?</label>
      <div class="options" data-q="q2">
        <label class="option"><input type="radio" name="q2" value="from_scratch"><span class="option-text">Explain from scratch, even if it seems like I already know it</span></label>
        <label class="option"><input type="radio" name="q2" value="scaffold"><span class="option-text">Give me the overall structure — I'll work out the details myself</span></label>
        <label class="option"><input type="radio" name="q2" value="example_first"><span class="option-text">A concrete example — then I'll take it from there</span></label>
        <label class="option"><input type="radio" name="q2" value="mechanics"><span class="option-text">I want to understand the mechanism, not just "take it on faith"</span></label>
      </div>
    </div>

    <!-- Q3 -->
    <div class="field">
      <label class="field-label"><span class="q-num">3</span>If you make a mistake in your reasoning, what's the best way to respond?</label>
      <div class="options" data-q="q3">
        <label class="option"><input type="radio" name="q3" value="direct"><span class="option-text">Say it directly: "no, here's the correct way" — don't waste time</span></label>
        <label class="option"><input type="radio" name="q3" value="socratic"><span class="option-text">Ask a leading question so I find the mistake myself</span></label>
        <label class="option"><input type="radio" name="q3" value="soft"><span class="option-text">Don't dwell on it — just correct it and move on</span></label>
      </div>
    </div>

    <!-- Q4 -->
    <div class="field">
      <label class="field-label"><span class="q-num">4</span>What pace is comfortable for you?</label>
      <div class="options" data-q="q4">
        <label class="option"><input type="radio" name="q4" value="slow"><span class="option-text">Slow, with repetition — better to cover less but understand deeply</span></label>
        <label class="option"><input type="radio" name="q4" value="medium"><span class="option-text">Medium — I'll say if I get lost</span></label>
        <label class="option"><input type="radio" name="q4" value="fast"><span class="option-text">Fast — no need to explain the obvious</span></label>
      </div>
    </div>

    <!-- Q5 -->
    <div class="field">
      <label class="field-label"><span class="q-num">5</span>What annoys you most in explanations?</label>
      <div class="options" data-q="q5">
        <label class="option"><input type="radio" name="q5" value="too_much_intro"><span class="option-text">Too-long introductions and filler</span></label>
        <label class="option"><input type="radio" name="q5" value="no_check"><span class="option-text">Not checking whether I understood — just talking and moving on</span></label>
        <label class="option"><input type="radio" name="q5" value="its_simple"><span class="option-text">Saying "this is simple" when it isn't simple for me</span></label>
        <label class="option"><input type="radio" name="q5" value="too_slow"><span class="option-text">Going too slowly, over-explaining what I already know</span></label>
      </div>
    </div>

    <!-- Q6 -->
    <div class="field">
      <label class="field-label"><span class="q-num">6</span>What matters most in the end?</label>
      <div class="options" data-q="q6">
        <label class="option"><input type="radio" name="q6" value="intuition"><span class="option-text">Understand the idea — why it exists, what the intuition behind it is</span></label>
        <label class="option"><input type="radio" name="q6" value="reproduce"><span class="option-text">Be able to reproduce the proof or solution myself</span></label>
        <label class="option"><input type="radio" name="q6" value="blocker"><span class="option-text">Resolve the specific blocker that's stopping me from moving forward</span></label>
        <label class="option"><input type="radio" name="q6" value="practical"><span class="option-text">See how it works in practice / in code</span></label>
      </div>
    </div>

    <!-- Q7 -->
    <div class="field">
      <label class="field-label"><span class="q-num">7</span>Lots of new terms at once — what's the best approach?</label>
      <div class="options" data-q="q7">
        <label class="option"><input type="radio" name="q7" value="glossary_first"><span class="option-text">Give a glossary or list of notation before diving in</span></label>
        <label class="option"><input type="radio" name="q7" value="one_by_one"><span class="option-text">Introduce one term at a time — not all at once</span></label>
        <label class="option"><input type="radio" name="q7" value="context_first"><span class="option-text">Context first — why the term is needed — then the definition</span></label>
      </div>
    </div>

    <!-- Q8 -->
    <div class="field">
      <label class="field-label"><span class="q-num">8</span>"You need to know X to understand Y" — what should happen with X?</label>
      <div class="options" data-q="q8">
        <label class="option"><input type="radio" name="q8" value="full_prereq"><span class="option-text">Explain X fully before moving on to Y</span></label>
        <label class="option"><input type="radio" name="q8" value="brief_prereq"><span class="option-text">Give a brief explanation of X, then move on to Y</span></label>
        <label class="option"><input type="radio" name="q8" value="skip_prereq"><span class="option-text">Skip X — I'll look it up myself later if I need to</span></label>
      </div>
    </div>
  </div>

  <!-- SESSION STATE -->
  <div class="section">
    <div class="section-title">Current state (this session)</div>
    <div class="field">
      <label class="field-label">How are you feeling right now?</label>
      <div class="options" data-q="session">
        <label class="option"><input type="radio" name="session" value="deep"><span class="option-text">I have time and energy — let's go deep</span></label>
        <label class="option"><input type="radio" name="session" value="quick"><span class="option-text">Short on time — give me the essentials</span></label>
        <label class="option"><input type="radio" name="session" value="light"><span class="option-text">Mentally tired — keep it light</span></label>
        <label class="option"><input type="radio" name="session" value="targeted"><span class="option-text">I have one specific point of confusion — the rest is fine</span></label>
      </div>
    </div>
  </div>

  <p class="error-msg" id="error-msg">Fill in your name and answer at least half the questions.</p>
  <button class="btn-generate" onclick="generate()">Generate profile →</button>

  <!-- OUTPUT -->
  <div class="output-section" id="output-section">
    <div class="output-header">
      <h2>Block for users.md</h2>
      <div style="display:flex; gap:8px;">
        <button class="btn-copy" id="copy-btn" onclick="copyOutput()">Copy</button>
        <button class="btn-copy" id="save-btn" onclick="saveToUsers()">Save to users.md</button>
      </div>
    </div>
    <pre id="output"></pre>
    <p id="save-status" style="font-size:0.85rem; margin-top:10px;"></p>
  </div>

</div>

<script>
// Highlight selected options
document.querySelectorAll('.option input[type="radio"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const group = radio.closest('.options');
    group.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    radio.closest('.option').classList.add('selected');
  });
});

// Mappings from answers to human-readable profile fields
const maps = {
  q1: {
    overview_first:   "overview → details (start with structure, then dive in)",
    linear:           "linear reading, stops at blockers",
    result_first:     "result-first (find main theorem, then unpack backwards)",
    formulas_first:   "formulas/code first, then prose explanation"
  },
  q2: {
    from_scratch:     "explain from scratch even if I seem to know it",
    scaffold:         "give scaffold/structure, I handle details myself",
    example_first:    "concrete example first, then generalise",
    mechanics:        "explain the mechanism, not just the result — no 'trust me'"
  },
  q3: {
    direct:    "direct correction — say 'no, it's X', don't waste time",
    socratic:  "leading question so I find the error myself",
    soft:      "soft — acknowledge, correct quietly, move on without dwelling"
  },
  q4: {
    slow:   "slow, with repetition — depth over breadth",
    medium: "medium — I'll flag if I'm lost",
    fast:   "fast — skip anything I'm expected to know"
  },
  q5: {
    too_much_intro: "concise — skip preamble and filler",
    no_check:       "check understanding often — don't just lecture and move on",
    its_simple:     "never say 'this is simple/obvious' — just explain it",
    too_slow:       "no over-explaining — respect that I know my basics"
  },
  q6: {
    intuition: "intuition and big-picture — why does this exist, what's the core idea",
    reproduce: "step-by-step so I can reproduce the proof/solution myself",
    blocker:   "targeted — I have a specific blocker, fix that first",
    practical: "practical — show me how this is used in code or real problems"
  },
  q7: {
    glossary_first: "give a glossary / notation list before diving in",
    one_by_one:     "introduce one term at a time, not all at once",
    context_first:  "context before definition — show WHY the term exists first"
  },
  q8: {
    full_prereq:  "full prerequisite explanation before continuing",
    brief_prereq: "brief prerequisite recap, then continue",
    skip_prereq:  "skip prerequisites — I'll look them up myself if needed"
  },
  session: {
    deep:     "ready for depth — has time and energy",
    quick:    "short on time — give only the essentials",
    light:    "low energy — needs lighter load today",
    targeted: "has a specific gap — focus there, rest is fine"
  }
};

function val(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}

// Filled in by generate(), read by copyOutput()/saveToUsers().
let lastBlock = '';
let lastName = '';

function generate() {
  const name = document.getElementById('name').value.trim();
  const errMsg = document.getElementById('error-msg');

  const answered = ['q1','q2','q3','q4','q5','q6','q7','q8'].filter(q => val(q) !== null);
  if (!name || answered.length < 4) {
    errMsg.style.display = 'block';
    return;
  }
  errMsg.style.display = 'none';

  const role      = document.getElementById('role').value.trim();
  const level     = document.getElementById('level').value;
  const interests = document.getElementById('interests').value.trim();
  const languages = document.getElementById('languages').value;

  const levelLabels = { beginner: 'beginner', intermediate: 'intermediate', expert: 'expert' };

  let lines = [`## ${name}`];
  if (role)      lines.push(`- role: ${role}`);
  if (level)     lines.push(`- level: ${levelLabels[level] || level}`);
  if (interests) lines.push(`- interests: ${interests}`);
  if (languages) lines.push(`- languages: ${languages}`);

  lines.push('');
  lines.push('<!-- learning profile (generated) -->');

  const qLabels = {
    q1: 'reading_style',
    q2: 'explanation_style',
    q3: 'error_handling',
    q4: 'pace',
    q5: 'tone_note',
    q6: 'focus',
    q7: 'new_terms',
    q8: 'background_gaps'
  };

  for (const [q, field] of Object.entries(qLabels)) {
    const v = val(q);
    if (v) lines.push(`- ${field}: ${maps[q][v]}`);
  }

  const sessionVal = val('session');
  if (sessionVal) {
    lines.push('');
    lines.push(`- session_state: ${maps.session[sessionVal]}`);
  }

  lastName = name;
  lastBlock = lines.join('\n');

  document.getElementById('output').textContent = lastBlock;
  document.getElementById('save-status').textContent = '';
  const sec = document.getElementById('output-section');
  sec.classList.add('visible');
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyOutput() {
  navigator.clipboard.writeText(lastBlock).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// Requires the page to be opened via profiling_server.py (http://localhost:8765/),
// not as a local file:// — only the server can write to app/users.md.
function saveToUsers() {
  const status = document.getElementById('save-status');
  status.style.color = '#666';
  status.textContent = 'Saving…';

  fetch('/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: lastName, block: lastBlock })
  })
    .then(async (res) => {
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.ok) {
        status.style.color = '#155724';
        status.textContent = `Saved to app/users.md ✓ (${lastName})`;
      } else {
        status.style.color = '#c0392b';
        status.textContent = data.error || 'Save failed.';
      }
    })
    .catch(() => {
      status.style.color = '#c0392b';
      status.textContent = 'Could not connect to the server. Run "python profiling_server.py" and open http://localhost:8765/ (not the HTML file directly).';
    });
}
</script>
</body>
</html>

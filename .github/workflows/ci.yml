name: CI

on:
  push:
  pull_request:

jobs:
  mock-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Integration smoke tests (mock — no API key)
        run: pytest -q
      - name: End-to-end mock run
        working-directory: app
        run: python main.py "https://example.com/ci-smoke" --mock
